<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="scanlines"></div>
    
    <nav class="title-nav">
        <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">☰</button>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="credits.html">Credits</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
    
    <div id="title-screen" class="title-screen">
        <!-- W3Schools reference: Layered positioned elements https://www.w3schools.com/css/css_positioning.asp -->
        <div class="title-bg" style="background-image: url('pictures/title_v3.png');"></div>
        <div class="title-overlay"></div>
        <div class="title-content">
            <h1 class="title-text">AXEL</h1>
            <button class="start-btn" onclick="window.location.href='game.html'">Start</button>
    </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nav = document.querySelector('.title-nav');
            const toggle = nav?.querySelector('.nav-toggle');
            if (!nav || !toggle) return;

            toggle.addEventListener('click', () => {
                const isOpen = nav.classList.toggle('nav-open');
                toggle.setAttribute('aria-expanded', String(isOpen));
            });

            nav.querySelectorAll('.nav-links a').forEach((link) => {
                link.addEventListener('click', () => {
                    nav.classList.remove('nav-open');
                    toggle.setAttribute('aria-expanded', 'false');
                });
            });
        });
    </script>
</body>
</html>
