    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

        <div class="nav-links">

            <a href="about.html">About</a>
            <a href="credits.html">Credits</a>

    <div class="filmstrip-container">
        <div class="filmstrip-track" id="filmstrip-track"></div>
    </div>

    <div id="imageModal" class="image-modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img id="modalImage" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt="" class="modal-image">
            <p id="modalCaption" class="modal-caption"></p>
        </div>
    </div>

    <script>
        const nav = document.querySelector('.title-nav');
        const navToggle = nav?.querySelector('.nav-toggle');
        if (nav && navToggle) {
            navToggle.addEventListener('click', () => {
                const isOpen = nav.classList.toggle('nav-open');
                navToggle.setAttribute('aria-expanded', String(isOpen));
            });

            nav.querySelectorAll('.nav-links a').forEach((link) => {
                link.addEventListener('click', () => {
                    nav.classList.remove('nav-open');
                    navToggle.setAttribute('aria-expanded', 'false');
                });
            });
        }

        const filmstripImages = [
            'backyard.png',
            'board.png',
            'cafeteria.png',
            'cafeteria_table.png',
            'cigarette.png',
            'classroom.png',
            'corridor.png',
            'creator.png',
            'desk.png',
            'desk_empty.jpg',
            'desk_hand.png',
            'google_map.png',
            'hub.png',
            'kitchen.png',
            'kitchen_no_flash.png',
            'map.png',
            'school.png',
            'teacher_key.png',
            'teacher_no_key.png',
            'title_v1.png',
            'title_v2.png',
            'title_v3.png'
        ];

        const humanizeFilename = (fileName) =>
            fileName
                .replace(/\.[^.]+$/, '')
                .replace(/_/g, ' ')
                .replace(/\b\w/g, (char) => char.toUpperCase());

        const track = document.getElementById('filmstrip-track');

        const buildFilmstripImage = (fileName) => {
            const image = document.createElement('img');
            const caption = humanizeFilename(fileName);
            image.src = `pictures/${fileName}`;
            image.alt = caption;
            image.className = 'filmstrip-image';
            image.dataset.caption = caption;
            image.style.cursor = 'pointer';
            return image;
        };

        const appendFilmstripSet = () => {
            filmstripImages.forEach((fileName) => {
                track.appendChild(buildFilmstripImage(fileName));
            });
        };

        const preloadFilmstripImages = () => Promise.all(
            filmstripImages.map((fileName) => new Promise((resolve) => {
                const image = new Image();
                image.onload = resolve;
                image.onerror = resolve;
                image.src = `pictures/${fileName}`;
            }))
        );

        const renderFilmstrip = () => {
            track.innerHTML = '';
            appendFilmstripSet();

            const singleSetWidth = track.scrollWidth;
            if (!singleSetWidth) return;

            const minimumTotalWidth = window.innerWidth + singleSetWidth;
            const repeatCount = Math.max(2, Math.ceil(minimumTotalWidth / singleSetWidth));

            for (let repeatIndex = 1; repeatIndex < repeatCount; repeatIndex++) {
                appendFilmstripSet();
            }

            track.style.setProperty('--filmstrip-loop-width', `${singleSetWidth}px`);
        };

        preloadFilmstripImages().then(renderFilmstrip);

        let resizeTimer;
        // W3Schools reference: JavaScript event listeners https://www.w3schools.com/js/js_htmldom_eventlistener.asp
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(renderFilmstrip, 120);
        });

        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalCaption = document.getElementById('modalCaption');

        track.addEventListener('click', (event) => {
            if (!(event.target instanceof HTMLImageElement)) return;
            if (!event.target.classList.contains('filmstrip-image')) return;

            modalImage.src = event.target.src;
            modalCaption.textContent = event.target.dataset.caption || '';
            modal.style.display = 'flex';
        });

        document.querySelector('.modal-close').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
